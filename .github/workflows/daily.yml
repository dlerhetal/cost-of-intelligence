name: Daily refresh

on:
  schedule:
    - cron: "17 5 * * *"  # 05:17 UTC daily
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual refresh (e.g. provider announcement)"
        required: false
        default: "manual"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest prices
        run: python scrapers/fetch_prices.py

      - name: Recompute Subsidy Index
        run: python scrapers/index_calc.py

      - name: Commit deltas
        run: |
          git config user.name "coi-bot"
          git config user.email "coi-bot@users.noreply.github.com"
          git add data/prices.json data/index_history.json site/index.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
