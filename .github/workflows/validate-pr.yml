name: Validate PR

on:
  pull_request:
    paths:
      - "data/**"
      - "scrapers/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: JSON schema validation
        run: |
          python -c "import json; json.load(open('data/prices.json'))"
          python -c "import json; json.load(open('data/providers.json'))"
          python -c "import json; json.load(open('data/cost_to_serve.json'))"
          python -c "import json; json.load(open('data/capacity_overhang.json'))"

      - name: Index calculator runs
        run: python scrapers/index_calc.py
